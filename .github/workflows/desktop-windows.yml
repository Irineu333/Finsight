name: Desktop Windows Installer

# Windows .exe/.msi installers can only be produced on a Windows host, because
# jpackage packages for the OS it runs on (and needs the WiX Toolset, which is
# preinstalled on GitHub's windows-latest image). This workflow builds them.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows installers (.exe + .msi)
        run: .\gradlew.bat :app:desktop:packageExe :app:desktop:packageMsi --stacktrace

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: finsight-windows-installers
          path: |
            app/desktop/build/compose/binaries/main/exe/*.exe
            app/desktop/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
