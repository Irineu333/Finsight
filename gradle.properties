#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx6144M
# Kotlin/Native compiler cache. Left at `none` (iOS-support boilerplate) it forced a
# full recompile+link of every native target on every build — the reason iOS test
# runs were slow. The default caches the klibs of unchanged dependencies for the
# host/simulator targets: the first build after a clean pays for the cache, every
# later one reuses it. Removed so Kotlin uses that default.
#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true
# Run independent modules concurrently. Safe with the configuration cache, and this
# build is a wide star of feature modules that were compiling one after another.
org.gradle.parallel=true
#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
