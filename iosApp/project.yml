name: iosApp

options:
  bundleIdPrefix: com.neoutils.finance
  deploymentTarget:
    iOS: "18.2"
  minimizedProjectReferenceProxies: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configuration/Config.xcconfig
  Release: Configuration/Config.xcconfig

settings:
  base:
    PRODUCT_NAME: finance

targets:
  iosApp:
    type: application
    platform: iOS

    sources:
      - path: iosApp
        excludes:
          - Info.plist

    info:
      path: iosApp/Info.plist
      properties:
        CADisableMinimumFrameDurationOnPhone: true
        CFBundleShortVersionString: "1.5.0-rc01"
        CFBundleVersion: "14"

    scheme:
      testTargets: []
      gatherCoverageData: false

    settings:
      base:
        # Code Signing
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QCCLMVRVB2

        # Product Settings
        PRODUCT_NAME: finance
        PRODUCT_BUNDLE_IDENTIFIER: com.neoutils.finance.finance
        TARGETED_DEVICE_FAMILY: "1,2"

        # Swift
        SWIFT_VERSION: "5.0"
        SWIFT_EMIT_LOC_STRINGS: YES

        # Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: iosApp/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

        # Assets
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

        # Previews
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"iosApp/Preview Content\""

        # Runtime Search Paths
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"

        # Architecture
        ARCHS: arm64

        # CRITICAL: Disable sandboxing to allow Gradle script
        ENABLE_USER_SCRIPT_SANDBOXING: NO

      debug:
        ONLY_ACTIVE_ARCH: YES

      release:
        VALIDATE_PRODUCT: YES

    preBuildScripts:
      - name: "Compile Kotlin Framework"
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build task invocation due to OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED environment variable set to \"YES\""
            exit 0
          fi
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        showEnvVarsInLog: false

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
